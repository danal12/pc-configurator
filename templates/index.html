<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Configurator</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>PC Configurator</h1>

<!-- ================= CONTROLS ================= -->
<div id="controls">

    <label>Назначение</label>
    <select id="purpose">
        <option value="gaming">Игры</option>
        <option value="office">Офис</option>
        <option value="video">Монтаж</option>
        <option value="universal">Универсальный</option>
    </select>

    <br><br>

    <label>Бюджет</label>
    <input type="range" id="budget" min="30000" max="300000" step="1000" value="100000">
    <div id="budget-value">100 000 ₽</div>

    <br>

    <label>Платформа</label>
    <div>
        <label><input type="radio" name="platform" value="amd" checked> AMD</label>
        <label><input type="radio" name="platform" value="intel"> Intel</label>
        <label><input type="radio" name="platform" value="any"> Не важно</label>
    </div>

    <br>

    <button onclick="generateBuilds()">Подобрать сборку</button>
    <button onclick="showMyBuilds()">Мои сборки</button>

</div>

<!-- ================= RESULTS ================= -->
<div id="results"></div>

<!-- ================= MODAL (ТОЛЬКО ОДНА!) ================= -->
<div class="modal fade" id="myBuildsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Мои сборки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div id="builds-list"></div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="editorModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Редактор сборки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <label>CPU</label>
        <select id="edit-cpu" class="form-select mb-2"></select>

        <label>GPU</label>
        <select id="edit-gpu" class="form-select mb-2"></select>

        <label>RAM</label>
        <select id="edit-ram" class="form-select mb-2"></select>

        <label>Motherboard</label>
        <select id="edit-mobo" class="form-select mb-2"></select>

        <label>PSU</label>
        <select id="edit-psu" class="form-select mb-2"></select>

        <hr>

        <h4>Итог: <span id="edit-total">0 ₽</span></h4>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="saveEditedBuild()">Сохранить</button>
      </div>

    </div>
  </div>
</div>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
