<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PC Configurator</title>

    <!-- STYLE -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- ICONS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >
</head>

<body>

    <h1>
        <i class="bi bi-pc-display"></i>
        PC Configurator
    </h1>

    <!-- ================= CONTROLS ================= -->
    <div id="controls">

        <!-- PURPOSE -->
        <label>
            <i class="bi bi-controller"></i>
            Назначение
        </label>

        <select id="purpose">

            <option value="gaming">
                🎮 Игры
            </option>

            <option value="office">
                💼 Офис
            </option>

            <option value="video">
                🎬 Монтаж
            </option>

            <option value="universal">
                ⚡ Универсальный
            </option>

        </select>

        <br>

        <!-- BUDGET -->
        <label>
            <i class="bi bi-cash-stack"></i>
            Бюджет
        </label>

        <div class="budget-wrap">

            <input
                type="range"
                id="budget"
                min="30000"
                max="300000"
                step="1000"
                value="100000"
            >

            <div id="budget-value">
                100 000 ₽
            </div>

            <!-- QUICK PRESETS -->
            <div class="budget-presets">

                <button onclick="setBudget(40000)">
                    40K
                </button>

                <button onclick="setBudget(60000)">
                    60K
                </button>

                <button onclick="setBudget(80000)">
                    80K
                </button>

                <button onclick="setBudget(100000)">
                    100K
                </button>

                <button onclick="setBudget(150000)">
                    150K
                </button>

                <button onclick="setBudget(200000)">
                    200K
                </button>

            </div>

        </div>

        <br>

        <!-- PLATFORM -->
        <label>
            <i class="bi bi-cpu"></i>
            Платформа
        </label>

        <div class="platform-buttons">

            <label>
                <input
                    type="radio"
                    name="platform"
                    value="amd"
                    checked
                >

                AMD
            </label>

            <label>
                <input
                    type="radio"
                    name="platform"
                    value="intel"
                >

                Intel
            </label>

            <label>
                <input
                    type="radio"
                    name="platform"
                    value="any"
                >

                Не важно
            </label>

        </div>

        <!-- MAIN BUTTONS -->
        <div class="main-buttons">

            <button onclick="generateBuilds()">
                <i class="bi bi-magic"></i>
                Подобрать сборку
            </button>

            <button onclick="showMyBuilds()">
                <i class="bi bi-bookmark-star"></i>
                Мои сборки
            </button>

        </div>

    </div>

    <!-- ================= RESULTS ================= -->
    <div id="results"></div>

    <!-- ================= MY BUILDS MODAL ================= -->
    <div
        class="modal fade"
        id="myBuildsModal"
        tabindex="-1"
    >

        <div class="modal-dialog modal-dialog-scrollable">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        <i class="bi bi-hdd-stack"></i>
                        Мои сборки
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>

                </div>

                <div class="modal-body">

                    <div id="builds-list"></div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= EDITOR MODAL ================= -->
    <div
        class="modal fade"
        id="editorModal"
        tabindex="-1"
    >

        <div
            class="modal-dialog modal-lg modal-dialog-scrollable"
        >

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title">
                        <i class="bi bi-tools"></i>
                        Редактор сборки
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>

                </div>

                <div class="modal-body">

                    <!-- CPU -->
                    <label>
                        <i class="bi bi-cpu-fill"></i>
                        CPU
                    </label>

                    <select
                        id="edit-cpu"
                        class="form-select mb-3"
                    ></select>

                    <!-- GPU -->
                    <label>
                        <i class="bi bi-gpu-card"></i>
                        GPU
                    </label>

                    <select
                        id="edit-gpu"
                        class="form-select mb-3"
                    ></select>

                    <!-- RAM -->
                    <label>
                        <i class="bi bi-memory"></i>
                        RAM
                    </label>

                    <select
                        id="edit-ram"
                        class="form-select mb-3"
                    ></select>

                    <!-- MOTHERBOARD -->
                    <label>
                        <i class="bi bi-motherboard"></i>
                        Motherboard
                    </label>

                    <select
                        id="edit-mobo"
                        class="form-select mb-3"
                    ></select>

                    <!-- PSU -->
                    <label>
                        <i class="bi bi-lightning-charge"></i>
                        PSU
                    </label>

                    <select
                        id="edit-psu"
                        class="form-select mb-3"
                    ></select>

                    <hr>

                    <!-- TOTAL -->
                    <div class="editor-summary">

                        <h4>
                            <i class="bi bi-wallet2"></i>
                            Итог:
                            <span id="edit-total">
                                0 ₽
                            </span>
                        </h4>

                    </div>

                    <!-- COMPATIBILITY -->
                    <div id="compatibility-box"></div>

                </div>

                <div class="modal-footer">

                    <button
                        class="btn btn-success"
                        onclick="saveEditedBuild()"
                    >
                        <i class="bi bi-floppy"></i>
                        Сохранить
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= SCRIPTS ================= -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script
        src="{{ url_for('static', filename='script.js') }}"
    ></script>

</body>
</html>
